<h2>总体概述</h2>
<h3>什么是ch1内核？</h3>
<p>ch1内核是rCore-Tutorial系列的第一个操作系统内核实现，它的核心目标是：<strong>从零开始构建一个能够在裸机上运行的、能够打印&quot;Hello, world!&quot;的最小操作系统内核</strong>。</p>
<p>这个内核虽然功能简单，但它完整展示了：</p>
<ul>
<li>如何脱离标准库独立运行</li>
<li>如何在裸机环境下初始化硬件</li>
<li>如何与底层固件（RustSBI）交互</li>
<li>如何实现最基本的输入输出功能</li>
</ul>
<h3>核心特征</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>mindmap
  root((ch1内核))
    特征
      最小化内核
      无标准库
      裸机运行
      RISC-V 64位
    功能
      打印输出
      内存段信息显示
      优雅退出
    技术栈
      Rust语言
      RISC-V汇编
      QEMU虚拟机
      RustSBI固件
</span></span></foreignObject></svg></code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3">
<h2>解决的需求</h2>
<h3>1. 学习需求</h3>
<p>帮助学生理解：</p>
<ul>
<li>应用程序与执行环境的关系</li>
<li>操作系统内核的启动过程</li>
<li>从用户态到内核态的转变</li>
<li>裸机编程的基本概念</li>
</ul>
<h3>2. 技术需求</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>graph TD
    A[标准应用程序] --&gt;|依赖| B[标准库 std]
    B --&gt;|依赖| C[操作系统]
    C --&gt;|依赖| D[硬件]
    
    E[ch1内核] --&gt;|依赖| F[核心库 core]
    F --&gt;|直接运行| G[RustSBI]
    G --&gt;|运行在| H[QEMU虚拟硬件]
    
    style A fill:#e1f5ff
    style E fill:#ffe1f5
    style B fill:#fff4e1
    style F fill:#fff4e1
</span></span></foreignObject></svg></code></pre>
<p><strong>主要解决的问题：</strong></p>
<ol>
<li><strong>脱离标准库依赖</strong>：标准库<code>std</code>需要操作系统支持，内核本身不能依赖它</li>
<li><strong>裸机执行环境</strong>：在没有操作系统的情况下运行程序</li>
<li><strong>内存布局控制</strong>：精确控制程序在内存中的位置和布局</li>
<li><strong>底层硬件交互</strong>：直接与硬件和固件通信</li>
</ol>
<h3>3. 功能需求对比</h3>
<table>
<thead>
<tr>
<th>特性</th>
<th>普通Rust程序</th>
<th>ch1内核</th>
</tr>
</thead>
<tbody>
<tr>
<td>标准库支持</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> std</td>
<td><img class="emoji" draggable="false" alt="❌" src="https://twemoji.maxcdn.com/2/svg/274c.svg" data-marp-twemoji=""/> 仅core</td>
</tr>
<tr>
<td>运行环境</td>
<td>操作系统上</td>
<td>裸机直接运行</td>
</tr>
<tr>
<td>入口函数</td>
<td>main()</td>
<td>rust_main()</td>
</tr>
<tr>
<td>内存管理</td>
<td>自动</td>
<td>手动配置</td>
</tr>
<tr>
<td>输出方式</td>
<td>println!宏</td>
<td>SBI调用</td>
</tr>
<tr>
<td>退出方式</td>
<td>正常返回</td>
<td>SBI关机</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4">

<h2>实现原理</h2>
<h3>1. 移除标准库依赖</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>flowchart TD
    Start[标准Rust程序] --&gt; A[添加 #!no_std]
    A --&gt; B[添加 #!no_main]
    B --&gt; C[实现 panic_handler]
    C --&gt; D[移除 println!等标准库宏]
    D --&gt; E[实现自定义 println!]
    E --&gt; F[裸机程序]
    
    style Start fill:#e1f5ff
    style F fill:#c8e6c9
</span></span></foreignObject></svg></code></pre>
<p><strong>关键步骤：</strong></p>
<ol>
<li><strong>禁用标准库</strong>: 使用<code>#![no_std]</code>告诉编译器不链接标准库</li>
<li><strong>禁用主函数</strong>: 使用<code>#![no_main]</code>因为裸机程序没有标准入口</li>
<li><strong>实现panic处理</strong>: 必须提供<code>#[panic_handler]</code>处理程序崩溃</li>
<li><strong>自定义入口</strong>: 通过链接脚本指定<code>_start</code>为程序入口</li>
</ol>
<h3>2. 构建最小运行时</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>sequenceDiagram
    participant C as 编译器
    participant L as 链接器
    participant A as entry.asm
    participant R as rust_main
    
    C-&gt;&gt;L: 编译Rust代码
    L-&gt;&gt;L: 读取linker.ld
    L-&gt;&gt;L: 设置BASE_ADDRESS=0x80200000
    L-&gt;&gt;A: 放置在.text.entry段
    A-&gt;&gt;A: 初始化栈指针
    A-&gt;&gt;R: 跳转到rust_main
    R-&gt;&gt;R: 清空BSS段
    R-&gt;&gt;R: 初始化日志
    R-&gt;&gt;R: 打印Hello World
    R-&gt;&gt;R: 显示内存信息
    R-&gt;&gt;R: 退出QEMU
</span></span></foreignObject></svg></code></pre>
<h3>3. SBI调用机制</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>sequenceDiagram
    participant K as 内核&lt;br/&gt;(Supervisor)
    participant S as RustSBI&lt;br/&gt;(Machine)
    participant H as 硬件
    
    K-&gt;&gt;K: console_putchar()
    K-&gt;&gt;K: sbi_call()
    K-&gt;&gt;S: ecall指令
    Note over K,S: 特权级切换 S-&gt;M
    S-&gt;&gt;S: 解析SBI调用号
    S-&gt;&gt;H: 操作UART硬件
    H-&gt;&gt;H: 输出字符
    S--&gt;&gt;K: 返回结果
    Note over S,K: 特权级切换 M-&gt;S
</span></span></foreignObject></svg></code></pre>
<p><strong>SBI调用流程：</strong></p>
<ol>
<li>内核准备好参数（a0-a2）和调用号（a17）</li>
<li>执行<code>ecall</code>指令触发特权级异常</li>
<li>RustSBI捕获异常并处理</li>
<li>RustSBI操作硬件完成功能</li>
<li>返回结果给内核</li>
</ol>
</section>

<h2>执行流程</h2>
<h3>完整启动流程</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>sequenceDiagram
    participant P as 电源/启动
    participant Q as QEMU
    participant H as 硬件ROM&lt;br/&gt;0x1000
    participant S as RustSBI&lt;br/&gt;0x80000000
    participant K as 内核&lt;br/&gt;0x80200000
    participant M as rust_main
    
    P-&gt;&gt;Q: 加电启动
    Q-&gt;&gt;H: PC=0x1000
    H-&gt;&gt;S: 跳转到0x80000000
    S-&gt;&gt;S: 初始化硬件
    S-&gt;&gt;S: 设置M模式
    S-&gt;&gt;K: 跳转到0x80200000
    Note over K: 执行_start
    
    K-&gt;&gt;K: la sp, boot_stack_top&lt;br/&gt;设置栈指针
    K-&gt;&gt;M: call rust_main
    
    M-&gt;&gt;M: clear_bss()&lt;br/&gt;清空BSS段
    M-&gt;&gt;M: logging::init()&lt;br/&gt;初始化日志
    M-&gt;&gt;M: println!(&quot;Hello, world!&quot;)
    M-&gt;&gt;M: 打印内存段信息
    M-&gt;&gt;M: QEMU_EXIT_HANDLE.exit_success()
    
    M--&gt;&gt;Q: 退出QEMU
</span></span></foreignObject></svg></code></pre>
<h3>详细执行阶段</h3>
<h4>阶段1: 硬件初始化（QEMU + RustSBI）</h4>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>stateDiagram-v2
    [*] --&gt; QEMU启动: 加电
    QEMU启动 --&gt; ROM代码: PC=0x1000
    ROM代码 --&gt; RustSBI: 跳转0x80000000
    RustSBI --&gt; 初始化硬件: M模式
    初始化硬件 --&gt; 跳转内核: 地址0x80200000
    跳转内核 --&gt; [*]
</span></span></foreignObject></svg></code></pre>
<p><strong>关键地址：</strong></p>
<ul>
<li><code>0x1000</code>: QEMU固化ROM代码起始地址</li>
<li><code>0x80000000</code>: RustSBI加载地址</li>
<li><code>0x80200000</code>: 内核加载地址（BASE_ADDRESS）</li>
</ul>
<h4>阶段2: 内核启动（entry.asm）</h4>
<pre><code class="language-assembly"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap># os/src/entry.asm
.section .text.entry
.globl _start
_start:
    la sp, boot_stack_top      # 加载栈顶地址到sp寄存器
    call rust_main              # 调用Rust主函数

.section .bss.stack
.globl boot_stack_lower_bound
boot_stack_lower_bound:
    .space 4096 * 16           # 分配64KB栈空间
.globl boot_stack_top
boot_stack_top:                 # 栈顶标识
</span></span></foreignObject></svg></code></pre>
<p><strong>作用：</strong></p>
<ol>
<li>设置栈指针，为后续Rust代码执行提供栈空间</li>
<li>跳转到Rust编写的内核主函数</li>
</ol>
<h4>阶段3: 内核初始化（rust_main）</h4>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>flowchart TD
    A[rust_main] --&gt; B[clear_bss&lt;br/&gt;清空BSS段]
    B --&gt; C[logging::init&lt;br/&gt;初始化日志系统]
    C --&gt; D[println!&lt;br/&gt;Hello World]
    D --&gt; E[打印内存段信息]
    E --&gt; F{日志级别}
    F --&gt;|TRACE| G[trace: .text段]
    F --&gt;|DEBUG| H[debug: .rodata段]
    F --&gt;|INFO| I[info: .data段]
    F --&gt;|WARN| J[warn: 栈信息]
    F --&gt;|ERROR| K[error: .bss段]
    G --&gt; L
    H --&gt; L
    I --&gt; L
    J --&gt; L
    K --&gt; L[exit_success&lt;br/&gt;退出QEMU]
    
    style A fill:#e1f5ff
    style L fill:#c8e6c9
</span></span></foreignObject></svg></code></pre>
<p><strong>代码流程：</strong></p>
<pre><code class="language-rust"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-comment">// os/src/main.rs</span>
<span class="hljs-meta">#[no_mangle]</span>
<span class="hljs-keyword">pub</span> <span class="hljs-function"><span class="hljs-keyword">fn</span> <span class="hljs-title">rust_main</span></span>() -&gt; ! {
    <span class="hljs-comment">// 1. 清空BSS段（未初始化数据段）</span>
    clear_bss();
    
    <span class="hljs-comment">// 2. 初始化日志系统</span>
    logging::init();
    
    <span class="hljs-comment">// 3. 打印欢迎信息</span>
    <span class="hljs-built_in">println!</span>(<span class="hljs-string">&quot;[kernel] Hello, world!&quot;</span>);
    
    <span class="hljs-comment">// 4. 打印各内存段信息（根据日志级别）</span>
    trace!(<span class="hljs-string">&quot;[kernel] .text [{:#x}, {:#x})&quot;</span>, stext, etext);
    debug!(<span class="hljs-string">&quot;[kernel] .rodata [{:#x}, {:#x})&quot;</span>, srodata, erodata);
    info!(<span class="hljs-string">&quot;[kernel] .data [{:#x}, {:#x})&quot;</span>, sdata, edata);
    warn!(<span class="hljs-string">&quot;[kernel] boot_stack top={:#x}, lower_bound={:#x}&quot;</span>, ...);
    error!(<span class="hljs-string">&quot;[kernel] .bss [{:#x}, {:#x})&quot;</span>, sbss, ebss);
    
    <span class="hljs-comment">// 5. 退出QEMU</span>
    crate::board::QEMU_EXIT_HANDLE.exit_success();
}
</span></span></foreignObject></svg></code></pre>

<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>graph LR
    A[应用程序&lt;br/&gt;User Mode&lt;br/&gt;U特权级] --&gt;|ecall| B[内核&lt;br/&gt;Supervisor Mode&lt;br/&gt;S特权级]
    B --&gt;|ecall| C[RustSBI&lt;br/&gt;Machine Mode&lt;br/&gt;M特权级]
    C --&gt;|直接访问| D[硬件]

<ul>
<li><strong>User Mode (U)</strong>: 最低特权级，运行应用程序</li>
<li><strong>Supervisor Mode (S)</strong>: 内核特权级，运行操作系统</li>
<li><strong>Machine Mode (M)</strong>: 最高特权级，运行RustSBI固件</li>

</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8">
<h2>核心组件详解</h2>
<h3>1. 链接脚本 (linker.ld)</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>graph TB
    subgraph LinkerScript[&quot;链接脚本作用&quot;]
        A[定义内存布局] --&gt; B[设置入口点&lt;br/&gt;ENTRY _start]
        B --&gt; C[指定基地址&lt;br/&gt;0x80200000]
        C --&gt; D[组织各段&lt;br/&gt;.text/.rodata/.data/.bss]
        D --&gt; E[导出符号&lt;br/&gt;stext/etext等]
    end
    
    style A fill:#e1f5ff
    style E fill:#c8e6c9
</span></span></foreignObject></svg></code></pre>
<p><strong>关键内容解析：</strong></p>
<pre><code class="language-ld"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap># os/src/linker.ld
OUTPUT_ARCH(riscv)              # 目标架构：RISC-V
ENTRY(_start)                   # 程序入口点
BASE_ADDRESS = 0x80200000;      # 内核起始物理地址

SECTIONS {
    . = BASE_ADDRESS;           # 当前位置设为基地址
    skernel = .;                # 内核起始标记
    
    # 代码段
    stext = .;
    .text : {
        *(.text.entry)          # 入口代码优先
        *(.text .text.*)
    }
    
    # 只读数据段
    . = ALIGN(4K);              # 4KB对齐
    etext = .;
    srodata = .;
    .rodata : { *(.rodata .rodata.*) }
    
    # 数据段
    . = ALIGN(4K);
    erodata = .;
    sdata = .;
    .data : { *(.data .data.*) }
    
    # BSS段（包括栈）
    . = ALIGN(4K);
    edata = .;
    .bss : {
        *(.bss.stack)           # 栈空间
        sbss = .;
        *(.bss .bss.*)
    }
    
    ebss = .;
    ekernel = .;                # 内核结束标记
}
</span></span></foreignObject></svg></code></pre>
<h3>2. SBI调用模块 (<a href="http://sbi.rs">sbi.rs</a>)</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>flowchart LR
    A[内核] --&gt;|console_putchar| B[sbi_call]
    B --&gt;|参数设置| C[寄存器]
    C --&gt;|a0-a2: 参数| D[ecall指令]
    C --&gt;|a17: 调用号| D
    D --&gt;|触发| E[RustSBI]
    E --&gt;|执行| F[硬件操作]
    
    style A fill:#e1f5ff
    style E fill:#fff4e1
    style F fill:#ffebee
</span></span></foreignObject></svg></code></pre>
<p><strong>核心实现：</strong></p>
<pre><code class="language-rust"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-comment">// os/src/sbi.rs</span>
<span class="hljs-keyword">const</span> SBI_CONSOLE_PUTCHAR: <span class="hljs-built_in">usize</span> = <span class="hljs-number">1</span>;  <span class="hljs-comment">// 控制台输出字符</span>

<span class="hljs-meta">#[inline(always)]</span>
<span class="hljs-function"><span class="hljs-keyword">fn</span> <span class="hljs-title">sbi_call</span></span>(which: <span class="hljs-built_in">usize</span>, arg0: <span class="hljs-built_in">usize</span>, arg1: <span class="hljs-built_in">usize</span>, arg2: <span class="hljs-built_in">usize</span>) -&gt; <span class="hljs-built_in">usize</span> {
    <span class="hljs-keyword">let</span> <span class="hljs-keyword">mut</span> ret;
    <span class="hljs-keyword">unsafe</span> {
        asm!(
            <span class="hljs-string">&quot;li x16, 0&quot;</span>,                    <span class="hljs-comment">// 扩展ID设为0</span>
            <span class="hljs-string">&quot;ecall&quot;</span>,                        <span class="hljs-comment">// 执行SBI调用</span>
            inlateout(<span class="hljs-string">&quot;x10&quot;</span>) arg0 =&gt; ret,   <span class="hljs-comment">// a0: 参数0/返回值</span>
            <span class="hljs-keyword">in</span>(<span class="hljs-string">&quot;x11&quot;</span>) arg1,                 <span class="hljs-comment">// a1: 参数1</span>
            <span class="hljs-keyword">in</span>(<span class="hljs-string">&quot;x12&quot;</span>) arg2,                 <span class="hljs-comment">// a2: 参数2</span>
            <span class="hljs-keyword">in</span>(<span class="hljs-string">&quot;x17&quot;</span>) which,                <span class="hljs-comment">// a17: SBI调用号</span>
        );
    }
    ret
}

<span class="hljs-keyword">pub</span> <span class="hljs-function"><span class="hljs-keyword">fn</span> <span class="hljs-title">console_putchar</span></span>(c: <span class="hljs-built_in">usize</span>) {
    sbi_call(SBI_CONSOLE_PUTCHAR, c, <span class="hljs-number">0</span>, <span class="hljs-number">0</span>);
}
</span></span></foreignObject></svg></code></pre>
<p><strong>SBI调用规范：</strong></p>
<ul>
<li><code>a0-a2</code> (x10-x12): 传递参数</li>
<li><code>a17</code> (x17): SBI调用号</li>
<li><code>a0</code> (x10): 返回值</li>
</ul>

<pre><code class="language-rust"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-comment">// os/src/console.rs</span>
<span class="hljs-keyword">use</span> core::fmt::{<span class="hljs-keyword">self</span>, Write};

<span class="hljs-class"><span class="hljs-keyword">struct</span> <span class="hljs-title">Stdout</span></span>;

<span class="hljs-keyword">impl</span> Write <span class="hljs-keyword">for</span> Stdout {

}

<span class="hljs-comment">// println!宏定义</span>

<span class="hljs-keyword">use</span> core::panic::PanicInfo;

<span class="hljs-meta">#[panic_handler]</span>
<span class="hljs-function"><span class="hljs-keyword">fn</span> <span class="hljs-title">panic</span></span>(info: &amp;PanicInfo) -&gt; ! {
    <span class="hljs-keyword">if</span> <span class="hljs-keyword">let</span> <span class="hljs-literal">Some</span>(location) = info.location() {
        <span class="hljs-built_in">println!</span>(
            <span class="hljs-string">&quot;[kernel] Panicked at {}:{} {}&quot;</span>,

        <span class="hljs-built_in">println!</span>(<span class="hljs-string">&quot;[kernel] Panicked: {}&quot;</span>, info.message().unwrap());

}

<h3>6. QEMU退出机制 (<a href="http://qemu.rs">qemu.rs</a>)</h3>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>sequenceDiagram
    participant K as 内核
    participant Q as QEMU
    participant H as sifive_test设备
    
    K-&gt;&gt;K: exit_success()
    K-&gt;&gt;Q: 写入0x5555到0x100000
    Q-&gt;&gt;H: 触发sifive_test

</span></span></foreignObject></svg></code></pre>
<p><strong>实现细节：</strong></p>
<pre><code class="language-rust"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap><span class="hljs-comment">// os/src/boards/qemu.rs</span>
<span class="hljs-keyword">const</span> EXIT_SUCCESS: <span class="hljs-built_in">u32</span> = <span class="hljs-number">0x5555</span>;        <span class="hljs-comment">// 成功退出码</span>
<span class="hljs-keyword">const</span> VIRT_TEST: <span class="hljs-built_in">u64</span> = <span class="hljs-number">0x100000</span>;         <span class="hljs-comment">// sifive_test设备地址</span>

<span class="hljs-keyword">impl</span> QEMUExit <span class="hljs-keyword">for</span> RISCV64 {
    <span class="hljs-function"><span class="hljs-keyword">fn</span> <span class="hljs-title">exit</span></span>(&amp;<span class="hljs-keyword">self</span>, code: <span class="hljs-built_in">u32</span>) -&gt; ! {
        <span class="hljs-keyword">unsafe</span> {
            asm!(
                <span class="hljs-string">&quot;sw {0}, 0({1})&quot;</span>,        # 写入退出码
                <span class="hljs-keyword">in</span>(reg)code, <span class="hljs-keyword">in</span>(reg)<span class="hljs-keyword">self</span>.addr
            );
            <span class="hljs-keyword">loop</span> {
                asm!(<span class="hljs-string">&quot;wfi&quot;</span>, options(nomem, nostack));  # 等待中断
            }
        }
    }
    
    <span class="hljs-function"><span class="hljs-keyword">fn</span> <span class="hljs-title">exit_success</span></span>(&amp;<span class="hljs-keyword">self</span>) -&gt; ! {
        <span class="hljs-keyword">self</span>.exit(EXIT_SUCCESS);
    }
}
</span></span></foreignObject></svg></code></pre>

<h3>关键知识点</h3>
<h4>1. 目标三元组 (Target Triplet)</h4>
<pre><code><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>riscv64gc-unknown-none-elf
  │     │    │    │   └─ 可执行文件格式
  │     │    │    └────── 无标准运行时库
  │     │    └─────────── 操作系统类型（none表示裸机）
  │     └──────────────── 厂商（unknown）
  └────────────────────── CPU架构（RISC-V 64位）
</span></span></foreignObject></svg></code></pre>
<h4>2. 裸机 vs 有OS环境</h4>
<table>
<thead>
<tr>
<th>特性</th>
<th>有OS环境</th>
<th>裸机环境</th>
</tr>
</thead>
<tbody>
<tr>
<td>入口点</td>
<td>main()</td>
<td>自定义(_start)</td>
</tr>
<tr>
<td>标准库</td>
<td>可用std</td>
<td>仅core</td>
</tr>
<tr>
<td>输出</td>
<td>系统调用</td>
<td>直接硬件/SBI</td>
</tr>
<tr>
<td>内存管理</td>
<td>OS提供</td>
<td>手动管理</td>
</tr>
<tr>
<td>退出</td>
<td>return</td>
<td>特殊机制</td>
</tr>
</tbody>
</table>
<h4>3. 内存段作用</h4>
<pre><code class="language-mermaid"><svg data-marp-fitting="svg" data-marp-fitting-code><foreignObject><span data-marp-fitting-svg-content><span data-marp-fitting-svg-content-wrap>graph LR
    A[.text&lt;br/&gt;代码段] --&gt; B[存放可执行指令]
    C[.rodata&lt;br/&gt;只读数据] --&gt; D[存放常量]

<h3>实验目标达成</h3>
<p>通过ch1内核的学习，你应该能够：</p>
<p><img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> <strong>理解</strong>应用程序执行环境的层次结构<br />
<img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> <strong>掌握</strong>脱离标准库编写裸机程序的方法<br />
<img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> <strong>熟悉</strong>RISC-V特权级架构和SBI调用机制<br />
<img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> <strong>学会</strong>使用链接脚本控制内存布局<br />
<img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> <strong>了解</strong>内核启动的基本流程<br />
<img class="emoji" draggable="false" alt="✅" src="https://twemoji.maxcdn.com/2/svg/2705.svg" data-marp-twemoji=""/> <strong>掌握</strong>交叉编译和QEMU调试方法</p>
<h3>扩展思考</h3>
<ol>
<li>
<p><strong>为什么内核入口地址是0x80200000？</strong></p>
<ul>
<li>RustSBI约定</li>
<li>避免与固件冲突</li>
<li>留出足够空间给SBI</li>
</ul>
</li>
<li>
<p><strong>为什么需要清空BSS段？</strong></p>
<ul>
<li>BSS段存放未初始化的全局变量</li>
<li>C/Rust标准要求未初始化变量为0</li>
<li>硬件不保证内存初始状态</li>
</ul>
</li>
<li>
<p><strong>SBI与系统调用的区别？</strong></p>
<ul>
<li>SBI: 内核→固件（S→M特权级）</li>
<li>系统调用: 应用→内核（U→S特权级）</li>
<li>都使用ecall指令，但目标不同</li>
</ul>
</li>
</ol>
